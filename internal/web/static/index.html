<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>k8s-deploy Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0d1117; color: #c9d1d9; line-height: 1.5;
  }
  .header {
    background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 18px; color: #58a6ff; font-weight: 600; }
  .header .meta { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 8px; }
  .container { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .card-title { font-size: 14px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; font-weight: 600; }
  .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #21262d; }
  .stat:last-child { border: none; }
  .stat-label { color: #8b949e; font-size: 13px; }
  .stat-value { font-weight: 600; }
  .ok { color: #3fb950; }
  .warning { color: #d29922; }
  .error { color: #f85149; }
  .info { color: #58a6ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8b949e; padding: 8px; font-weight: 600; border-bottom: 1px solid #30363d; }
  td { padding: 8px; border-bottom: 1px solid #21262d; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge-success { background: #033b1a; color: #3fb950; }
  .badge-failed { background: #3d0f0f; color: #f85149; }
  .badge-pending { background: #1d2c3a; color: #58a6ff; }
  .badge-expired { background: #2c1d1a; color: #d29922; }
  button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  button:hover { background: #2ea043; }
  button:disabled { background: #484f58; cursor: not-allowed; }
  code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #79c0ff; }

  /* Connection status indicator */
  .conn-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
  }
  .conn-status.connected { background: #033b1a; color: #3fb950; }
  .conn-status.connecting { background: #1d2c3a; color: #58a6ff; }
  .conn-status.disconnected { background: #2c1d1a; color: #d29922; }
  .conn-status.error { background: #3d0f0f; color: #f85149; }
  .conn-status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: currentColor;
    animation: pulse 2s infinite;
  }
  .conn-status.disconnected .dot, .conn-status.error .dot { animation: none; }

  /* Events feed */
  .events {
    max-height: 300px; overflow-y: auto;
    background: #0d1117; border-radius: 6px; padding: 12px;
    font-family: monospace; font-size: 12px;
  }
  .event {
    padding: 4px 8px; margin: 2px 0;
    border-left: 3px solid #30363d;
    background: #161b22; border-radius: 0 4px 4px 0;
  }
  .event.priority-high { border-left-color: #d29922; }
  .event.priority-critical { border-left-color: #f85149; }
  .event .ts { color: #8b949e; }
  .event .type { color: #58a6ff; font-weight: 600; }
  .event .body { color: #c9d1d9; margin-top: 2px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="header">
  <h1>k8s-deploy</h1>
  <div class="meta">
    <span id="conn-status" class="conn-status connecting">
      <span class="dot"></span>
      <span id="conn-label">conectando...</span>
    </span>
    <span>v1.0 · Go</span>
  </div>
</div>
<div class="container">
  <div class="grid">
    <div class="card">
      <div class="card-title">Clusters</div>
      <div id="clusters">loading...</div>
    </div>
    <div class="card">
      <div class="card-title">Status Geral</div>
      <div id="status">loading...</div>
    </div>
  </div>

  <div class="card" style="margin-bottom: 24px;">
    <div class="card-title">Ações</div>
    <div style="display: flex; gap: 8px;">
      <button id="deploy-btn">Trigger Deploy</button>
      <button id="refresh-btn" style="background: #21262d;">Refresh</button>
    </div>
  </div>

  <div class="card" style="margin-bottom: 24px;">
    <div class="card-title">Eventos (tempo real)</div>
    <div id="events" class="events"></div>
  </div>

  <div class="card">
    <div class="card-title">Deployments</div>
    <table>
      <thead>
        <tr><th>Rev</th><th>Project</th><th>Status</th><th>Started</th><th>Error</th></tr>
      </thead>
      <tbody id="deployments"></tbody>
    </table>
  </div>
</div>

<script>
const project = new URLSearchParams(location.search).get("project") || "";

let ws = null;
let sseSource = null;
let reconnectAttempt = 0;
let mode = 'unknown'; // ws / sse
let pollInterval = null;
let lastEventId = null;

const MAX_RECONNECT_DELAY = 60000;
const BASE_RECONNECT_DELAY = 500;

function setStatus(status, text) {
  const el = document.getElementById('conn-status');
  el.className = 'conn-status ' + status;
  document.getElementById('conn-label').textContent = text;
}

// Tentar WebSocket primeiro, com fallback para SSE
function connect() {
  if (mode === 'ws' && ws) return;
  if (mode === 'sse' && sseSource) return;

  setStatus('connecting', 'conectando...');

  try {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = () => {
      console.log('WS connected');
      reconnectAttempt = 0;
      mode = 'ws';
      setStatus('connected', 'conectado (ws)');
      sendWs({ action: 'subscribe', types: ['deployment.status','cluster.health','rollout.step','alert'] });
    };

    ws.onmessage = (msg) => {
      try {
        const ev = JSON.parse(msg.data);
        handleEvent(ev);
        lastEventId = ev.id;
      } catch(e) { console.error(e); }
    };

    ws.onerror = (e) => {
      console.warn('WS error, will fallback to SSE', e);
      if (mode !== 'ws') { setStatus('error', 'erro ws'); return; }
      // tenta SSE
      try { ws.close(); } catch(_) {}
      ws = null;
      mode = 'unknown';
      setTimeout(connectSSE, 100);
    };

    ws.onclose = () => {
      console.warn('WS closed');
      if (mode === 'ws') {
        mode = 'unknown';
        scheduleReconnect();
      }
    };
  } catch (e) {
    console.warn('WS unsupported', e);
    connectSSE();
  }
}

function connectSSE() {
  if (mode === 'sse') return;
  setStatus('connecting', 'conectando SSE...');
  try {
    let url = '/ws?mode=sse';
    if (lastEventId) url += '&since=' + encodeURIComponent(lastEventId);
    sseSource = new EventSource(url);

    sseSource.addEventListener('open', () => {
      reconnectAttempt = 0;
      mode = 'sse';
      setStatus('connected', 'conectado (sse)');
    });

    sseSource.addEventListener('error', () => {
      if (sseSource.readyState === EventSource.CLOSED) {
        sseSource.close();
        sseSource = null;
        mode = 'unknown';
        setStatus('disconnected', 'reconectando...');
        scheduleReconnect();
      }
    });

    // Listener generico
    sseSource.onmessage = (e) => {
      try {
        const ev = JSON.parse(e.data);
        handleEvent(ev);
        lastEventId = ev.id;
      } catch(err) { console.error(err); }
    };

    // Listeners tipados
    ['deployment.status','cluster.health','rollout.step','rollout.paused','alert','notification']
      .forEach(t => {
        sseSource.addEventListener(t, (e) => {
          try {
            const ev = JSON.parse(e.data);
            handleEvent(ev);
            lastEventId = ev.id;
          } catch(err) { console.error(err); }
        });
      });
  } catch (e) {
    console.error('SSE failed', e);
    scheduleReconnect();
  }
}

function scheduleReconnect() {
  const delay = Math.min(MAX_RECONNECT_DELAY, BASE_RECONNECT_DELAY * Math.pow(2, reconnectAttempt));
  reconnectAttempt++;
  setStatus(reconnectAttempt > 3 ? 'error' : 'connecting', 'reconectando em ' + Math.round(delay/1000) + 's...');
  setTimeout(() => {
    if (!ws && !sseSource) connect();
  }, delay);
}

function sendWs(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function handleEvent(ev) {
  const div = document.getElementById('events');
  const d = document.createElement('div');
  d.className = 'event';
  if (ev.priority === 3) d.classList.add('priority-high');
  if (ev.priority === 4) d.classList.add('priority-critical');
  const ts = new Date(ev.ts).toLocaleTimeString();
  d.innerHTML = `<span class="ts">${ts}</span> <span class="type">${ev.type}</span>: <span class="body">${JSON.stringify(ev.data)}</span>`;
  div.insertBefore(d, div.firstChild);
  if (div.children.length > 50) div.removeChild(div.lastChild);

  // Reacts a tipos
  if (ev.type === 'deployment.status' || ev.type === 'cluster.health') {
    refresh();
  }
}

async function fetchJSON(path) {
  const r = await fetch(path);
  return r.json();
}

async function refresh() {
  try {
    const [clusters, status, deps] = await Promise.all([
      fetchJSON("/api/clusters"),
      fetchJSON("/api/status"),
      fetchJSON("/api/deployments?project=" + encodeURIComponent(project))
    ]);

    document.getElementById("clusters").innerHTML = clusters.map(c => `
      <div class="stat">
        <span class="stat-label">${c.name} <code>${c.context}</code> · ns=${c.namespace}</span>
        <span class="stat-value ${c.healthy ? 'ok' : 'error'}">${c.healthy ? 'SAUDÁVEL' : 'OFFLINE'}</span>
      </div>
    `).join("") || '<div style="color: #8b949e;">sem clusters</div>';

    document.getElementById("status").innerHTML = `
      <div class="stat"><span class="stat-label">Clusters Saudáveis</span>
        <span class="stat-value ${status.clusters_healthy === status.clusters_total ? 'ok' : 'error'}">
          ${status.clusters_healthy} / ${status.clusters_total}
        </span></div>
      <div class="stat"><span class="stat-label">Último Deploy</span>
        <span class="stat-value">${status.last_deployment}</span></div>
    `;

    document.getElementById("deployments").innerHTML = deps.map(d => {
      const badge = ({success: 'badge-success', failed: 'badge-failed', pending: 'badge-pending', expired: 'badge-expired'})[d.status] || '';
      return `<tr>
        <td>${d.rev}</td>
        <td><code>${d.project}</code></td>
        <td><span class="badge ${badge}">${d.status}</span></td>
        <td>${d.started}</td>
        <td style="color: ${d.error ? '#f85149' : '#8b949e'}">${d.error || '-'}</td>
      </tr>`;
    }).join("") || '<tr><td colspan="5" style="text-align: center; color: #8b949e;">sem deploys</td></tr>';
  } catch(e) {
    console.error(e);
  }
}

document.getElementById("deploy-btn").onclick = async () => {
  if (!project) { alert("Use ?project=NOME"); return; }
  const r = await fetch("/api/trigger?project=" + encodeURIComponent(project), { method: "POST" });
  const j = await r.json();
  alert("Trigger: " + JSON.stringify(j));
};

document.getElementById("refresh-btn").onclick = refresh;

connect();
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
